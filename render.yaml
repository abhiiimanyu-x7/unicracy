services:
  - type: web
    name: unicracy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        placeholder: "Your MongoDB Atlas connection URI"
      - key: GOOGLE_CLIENT_ID
        placeholder: "Optional: Your Google OAuth Client ID"
      - key: GOOGLE_CLIENT_SECRET
        placeholder: "Optional: Your Google OAuth Client Secret"
      - key: GOOGLE_REDIRECT_URI
        placeholder: "Optional: https://your-app.onrender.com/auth/google/callback"
      - key: BYPASS_OTP
        value: "false"
      - key: BREVO_API_KEY
        placeholder: "Your Brevo API Key"
      - key: BREVO_FROM_EMAIL
        value: "noreply@unicracy.com"
